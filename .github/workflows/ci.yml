name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  repository-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate repository files
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f CONTRIBUTING.md
          test -f LICENSE
          test -f .github/CODEOWNERS
          test -f .github/pull_request_template.md
          test -f .ai/AI_PROJECT_OPERATING_SYSTEM.md

      - name: Validate docs folders
        run: |
          test -f docs/PROJECT_PRD.md
          test -f docs/ROADMAP.md
          test -f docs/TODO.md
          test -f docs/MEMORY.md
          test -f docs/ARCHITECTURE.md
          test -f docs/DATABASE.md
          test -f docs/API.md
          test -f docs/SEO.md
          test -f docs/GEO.md
          test -f docs/CRM.md
          test -f docs/PARTNER.md
          test -f docs/CONTENT.md
          test -f docs/STYLEGUIDE.md
          test -f docs/DEPLOYMENT.md
          test -f docs/GIT_WORKFLOW.md
          test -f docs/ISSUE_WORKFLOW.md
          test -f docs/REPOSITORY_MAINTENANCE.md
          test -f docs/WEBSITE_ARCHITECTURE.md
          test -f docs/WEBSITE_SEO_BLUEPRINT.md
          test -f docs/CONTENT_SYSTEM.md
          test -f docs/M2_STRATEGY.md
          test -f docs/PAGE_SYSTEM.md
          test -f docs/METADATA_SCHEMA.md
          test -f docs/SEO_SCHEMA_LAYER.md
          test -f docs/ENTITY_SYSTEM.md
          test -f docs/PRODUCT_SYSTEM.md
          test -f docs/PRODUCT_CONTENT_MODEL.md
          test -f docs/PRODUCT_SCHEMA.md
          test -f docs/PRODUCT_SEO_TEMPLATE.md
          test -f docs/PARTNER_FUNNEL.md
          test -f docs/PARTNER_CONTENT_MODEL.md
          test -f docs/PARTNER_SEO_TEMPLATE.md
          test -f docs/LEAD_SCHEMA.md

      - name: Validate governance boundaries
        run: |
          test ! -f PROJECT_PRD.md
          test ! -f ROADMAP.md
          test ! -f TODO.md
          test ! -f docs/CHANGELOG.md

      - name: Validate website governance
        run: node scripts/validate-website-governance.mjs

  website-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
